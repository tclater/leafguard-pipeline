services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${DB_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U sa -P "$$SA_PASSWORD"
        -No -Q "SELECT 1"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_HOST: "db"
      DB_PORT: "1433"
      DB_NAME: "${DB_NAME}"
      DB_USER: "sa"
      DB_PASSWORD: "${DB_PASSWORD}"
      APP_ENV: "${APP_ENV:-development}"
      SECRET_KEY: "${SECRET_KEY}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: "${FRONTEND_TARGET:-development}"
    ports:
      - "3000:3000"
    # No VITE_API_URL in dev — Vite proxy forwards /api/* to backend:8000 internally
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  mssql_data:
